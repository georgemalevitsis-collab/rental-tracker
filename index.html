<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f18">
<title>Portfolio Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0d0f18!important;color:#e8e4dc;font-family:'DM Sans',system-ui,sans-serif;min-height:100%;font-size:14px;-webkit-font-smoothing:antialiased}

:root{
  --bg:#0d0f18;--sur:#161926;--s2:#1e2130;--s3:#252838;
  --bor:#232638;--bor2:#2e3248;
  --txt:#e8e4dc;--mut:#6a7080;--dim:#3a3d4a;
  --gld:#e8d5a3;--gldD:#a89060;
  --grn:#5cb87a;--grnB:#152a1e;--grnBo:#1e4a2e;
  --red:#e07070;--redB:#2a1515;--redBo:#4a2020;
  --blu:#5b8dee;--bluB:#1a2340;--bluBo:#2a3a60;
}
input,select,textarea,button{font-family:inherit;font-size:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gld)!important;box-shadow:0 0 0 3px rgba(232,213,163,.1)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px}
.serif{font-family:'Playfair Display',Georgia,serif}
/* layout */
#app{min-height:100vh}
.hdr{background:var(--sur);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:100}
.hdr-i{max-width:1100px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e8d5a3,#a07830);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.logo-text{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gld)}
.hdr-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.nav{background:var(--sur);border-bottom:1px solid var(--bor);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-i{max-width:1100px;margin:0 auto;padding:0 12px;display:flex;white-space:nowrap;min-width:fit-content}
.nav-btn{padding:10px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--mut);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.nav-btn.active{color:var(--gld);border-bottom-color:var(--gld)}
.body{max-width:1100px;margin:0 auto;padding:16px 16px calc(60px + env(safe-area-inset-bottom,0px))}
/* cards */
.card{background:var(--sur);border:1.5px solid var(--bor);border-radius:13px;overflow:hidden;margin-bottom:12px}
.kpi-grid{display:grid;gap:10px;margin-bottom:12px}
.kpi-grid.c3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.c4{grid-template-columns:repeat(4,1fr)}
.kpi{border-radius:11px;padding:11px 13px;border:1.5px solid}
.kpi-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:4px;opacity:.8}
.kpi-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:8px;font-weight:700;cursor:pointer;border:none;transition:opacity .12s;white-space:nowrap;line-height:1}
.btn:active{opacity:.75}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-md{padding:8px 14px;font-size:13px}
.btn-full{width:100%;padding:11px;font-size:14px}
.btn-gold{background:var(--gld);color:#0c0e16}
.btn-dark{background:var(--s2);color:var(--mut);border:1.5px solid var(--bor2)}
.btn-ghost{background:transparent;color:var(--mut);border:1.5px solid var(--bor2)}
.btn-green{background:var(--grnB);color:var(--grn);border:1.5px solid var(--grnBo)}
.btn-blue{background:var(--bluB);color:var(--blu);border:1.5px solid var(--bluBo)}
.btn-red{background:var(--redB);color:var(--red);border:1.5px solid var(--redBo)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
/* forms */
.finp{width:100%;background:var(--s2);border:1.5px solid var(--bor2);color:var(--txt);padding:10px 12px;border-radius:9px;font-size:14px;appearance:none;-webkit-appearance:none}
.flabel{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.fgroup{margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
/* pill bar */
.pill-bar{background:var(--sur);border:1.5px solid var(--bor);border-radius:10px;padding:8px 12px;margin-bottom:11px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{padding:5px 11px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;border:1.5px solid var(--bor2);background:var(--s2);color:var(--mut);transition:all .15s}
.pill.active-grn{border-color:var(--grn);background:var(--grn);color:#0c0e16}
.pill-edit,.pill-del{background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;line-height:1}
.pill-del{color:var(--red)}
.pill-edit{color:var(--dim)}
/* tabs */
.seg{display:inline-flex;background:var(--s2);border-radius:9px;padding:3px;margin-bottom:12px;gap:2px;border:1px solid var(--bor);flex-wrap:wrap}
.seg-btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:var(--mut);transition:all .15s}
.seg-btn.active{background:var(--gld);color:#0c0e16}
/* table */
.tbl-wrap{width:100%;overflow:hidden}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px}
.tbl th{padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--mut);border-bottom:1px solid var(--bor);text-align:left;background:var(--s3);white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--s3);color:var(--txt);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
.tbl td.mut{color:var(--mut)}
.tbl td.grn{color:var(--grn);font-weight:700}
.tbl td.red{color:var(--red);font-weight:700}
.tbl td.gld{color:var(--gld);font-weight:700}
.tbl tfoot td{padding:8px 10px;border-top:1.5px solid var(--bor);background:#0b0d16;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);font-weight:700}
.tbl tfoot td.r{font-size:13px;letter-spacing:0;text-transform:none;font-variant-numeric:tabular-nums}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--dim);font-size:15px;padding:2px 5px;line-height:1}
.tag{display:inline-flex;align-items:center;background:var(--s3);color:var(--gldD);padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid var(--bor);white-space:nowrap}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--sur);border:1.5px solid var(--bor2);border-radius:17px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;margin:auto;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--sur);z-index:1}
.modal-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gld)}
.modal-x{background:var(--s3);border:none;border-radius:50%;width:25px;height:25px;cursor:pointer;font-size:14px;color:var(--mut);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-body{padding:16px 20px 20px}
/* section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.sh-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut)}
/* empty state */
.empty{padding:40px 20px;text-align:center}
.empty-icon{font-size:30px;margin-bottom:10px}
.empty-title{font-size:13px;color:var(--mut);font-weight:500;margin-bottom:4px}
.empty-sub{font-size:11px;color:var(--dim)}
/* master cards */
.port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.port-card{background:var(--sur);border-radius:12px;padding:13px;cursor:pointer;border:1.5px solid var(--bor)}
/* toggle */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bor)}
.tog-label{font-size:13px;color:var(--txt);font-weight:500}
.tog{width:40px;height:22px;border-radius:11px;background:var(--dim);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.tog.on{background:var(--gld)}
.tog-dot{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:8px;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tog.on .tog-dot{left:21px}
/* quick add */
.qa-box{background:var(--s2);border:1.5px solid var(--bor2);border-radius:12px;padding:12px;margin-bottom:11px}
.qa-label{font-size:9px;color:var(--gldD);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:7px}
.qa-row{display:flex;gap:8px;align-items:flex-end}
.qa-input{flex:1;background:var(--s3);border:1px solid var(--bor);color:var(--txt);font-size:13px;resize:none;border-radius:9px;padding:8px 11px;line-height:1.5;caret-color:var(--gld)}
.qa-btn{background:var(--gld);color:#0c0e16;border:none;border-radius:9px;padding:8px 13px;font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0;height:50px}
.qa-hint{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.qa-preview{background:var(--grnB);border:1.5px solid var(--grnBo);border-radius:11px;padding:12px;margin-bottom:10px}
.qa-preview-label{font-size:9px;color:var(--grn);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:9px}
.qa-preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.qa-field-label{font-size:9px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.qa-field-val{font-size:13px;font-weight:700;color:var(--gld)}
.qa-preview-actions{display:flex;gap:7px}
/* receipt drive icon */
.drive-link{color:var(--blu);text-decoration:none;font-size:13px}
/* warn box */
.warn{background:var(--redB);border:1.5px solid var(--redBo);border-radius:10px;padding:13px;font-size:13px;color:var(--red);line-height:1.7;margin-bottom:14px}
/* summary table */
.sum-hdr{padding:9px 12px;border-bottom:1px solid var(--bor);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);background:var(--s3)}
/* contact cards */
.cont-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.cont-card{background:var(--s2);border:1.5px solid var(--bor);border-radius:12px;padding:13px}
.cont-name{font-size:13px;font-weight:700;color:var(--gld);margin-bottom:2px}
.cont-role{font-size:11px;color:var(--mut)}
.cont-actions{display:flex;gap:5px}
.cont-edit{background:var(--s3);border:none;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center}
.cont-del{background:var(--redB);border:none;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center}
.cont-divider{border-top:1px solid var(--bor);padding-top:8px;margin-top:8px;display:flex;flex-direction:column;gap:5px}
.cont-row{display:flex;gap:8px;font-size:11px;align-items:flex-start}
.cont-row-label{color:var(--mut);font-size:9px;width:44px;flex-shrink:0;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding-top:1px}
.cont-row a{color:var(--blu);font-weight:600;text-decoration:none;word-break:break-all}
/* util cards */
.util-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.util-card{background:var(--sur);border:1.5px solid var(--bor);border-radius:12px;padding:13px}
/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{background:var(--sur);border:1.5px solid var(--bor);border-radius:20px;padding:26px;width:100%;max-width:360px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-mark{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,#e8d5a3,#a07830);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.login-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gld);margin-bottom:5px}
.login-sub{font-size:13px;color:var(--mut)}
.login-switch{text-align:center;font-size:13px;color:var(--mut);margin-top:16px}
.login-switch span{color:var(--gld);font-weight:700;cursor:pointer}
.login-note{margin-top:14px;padding:10px 12px;background:var(--s2);border-radius:8px;border:1px solid var(--bor);font-size:12px;color:var(--mut);text-align:center;line-height:1.6}
/* receipt modal */
.receipt-drop{border:2px dashed var(--bor2);border-radius:13px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--s2)}
.receipt-drop-icon{font-size:38px;margin-bottom:10px}
/* misc */
.bar{height:2px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:7px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.info-box{background:var(--s2);border:1px solid var(--bor);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--mut);line-height:1.6;margin-top:12px;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
// ─── CONSTANTS ───────────────────────────────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CY=new Date().getFullYear();
const YEARS=Array.from({length:21},(_,i)=>CY-10+i);
const RE_CATS=['Mortgage','Insurance','Taxes','Repairs','Maintenance','Management','Utilities','HOA','Other'];
const INV_ST=['Draft','Sent','Paid','Overdue','Cancelled'];
const UTIL_T=['Electric','Gas','Water','Internet','Trash','Sewer','HOA','Security','Other'];
const UTIL_I={Electric:'⚡',Gas:'🔥',Water:'💧',Internet:'📶',Trash:'🗑️',Sewer:'🚿',HOA:'🏘️',Security:'🔒',Other:'📋'};
const BIZ_ICONS=['💼','🏗️','⚡','🏡','💻','🏥','🚗','🍕','✂️','📦','🎨','🔧','🌿','📱','🏋️','🎵','📸','🛒','✈️','🏦'];
const BIZ_COLORS=[
  {label:'Blue',    val:'#5b8dee',bg:'#1a2340',bor:'#2a3a60'},
  {label:'Emerald', val:'#5cb87a',bg:'#152a1e',bor:'#1e4a2e'},
  {label:'Gold',    val:'#e8d5a3',bg:'#2a2410',bor:'#4a3e18'},
  {label:'Violet',  val:'#a78bfa',bg:'#1e1a35',bor:'#3a2a60'},
  {label:'Rose',    val:'#f472b6',bg:'#2a1525',bor:'#5a2040'},
  {label:'Cyan',    val:'#22d3ee',bg:'#0f2530',bor:'#1a3e50'},
  {label:'Orange',  val:'#fb923c',bg:'#2a1a0f',bor:'#5a3010'},
  {label:'Lime',    val:'#a3e635',bg:'#1a2810',bor:'#2e4818'},
];
const API_URL='https://your-app.ondigitalocean.app';

// ─── HELPERS ─────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const fmt=n=>(+n||0).toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
const fmtD=n=>(+n||0).toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2});
const el=(tag,props,...kids)=>{
  const e=document.createElement(tag);
  if(props) for(const[k,v] of Object.entries(props)){
    if(k==='class')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const k of kids){
    if(k==null||k===false)continue;
    e.append(typeof k==='string'||typeof k==='number'?document.createTextNode(String(k)):k);
  }
  return e;
};
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

// ─── STATE ───────────────────────────────────
const S={
  selYear:CY,
  activePort:'master',
  // RE
  properties:[{id:'p1',name:'My Property',address:'',notes:''}],
  selProp:'p1',
  reTab:'income',
  reInc:{},reExp:{},reUtils:{},reCont:{},
  // Biz
  bizs:[],
  selBizEnt:{},
  bizTab:{},
  // UI
  modal:null,
  modalData:{},
  // Auth
  user:null,
  token:null,
};

// Load from localStorage
try{
  const saved=localStorage.getItem('ph_state');
  if(saved){
    const d=JSON.parse(saved);
    ['properties','reInc','reExp','reUtils','reCont','bizs','selBizEnt','bizTab'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    if(S.properties.length) S.selProp=S.properties[0].id;
  }
  const u=localStorage.getItem('ph_user');
  if(u)S.user=JSON.parse(u);
  S.token=localStorage.getItem('ph_token')||null;
}catch(e){}

function save(){
  try{localStorage.setItem('ph_state',JSON.stringify({properties:S.properties,reInc:S.reInc,reExp:S.reExp,reUtils:S.reUtils,reCont:S.reCont,bizs:S.bizs,selBizEnt:S.selBizEnt,bizTab:S.bizTab}));}catch(e){}
}

// ─── RE HELPERS ──────────────────────────────
const getRI=(p,y)=>(S.reInc[p]||{})[y]||[];
const getRE=(p,y)=>(S.reExp[p]||{})[y]||[];
const getRU=p=>S.reUtils[p]||[];
const getRC=p=>S.reCont[p]||[];
const reSums=(p,y)=>{const i=getRI(p,y).reduce((s,e)=>s+e.amount,0),x=getRE(p,y).reduce((s,e)=>s+e.amount,0);return{i,e:x,n:i-x};};
const reTot=y=>S.properties.reduce((a,p)=>{const s=reSums(p.id,y);return{i:a.i+s.i,e:a.e+s.e,n:a.n+s.n}},{i:0,e:0,n:0});

// ─── BIZ HELPERS ─────────────────────────────
const getBiz=id=>S.bizs.find(b=>b.id===id);
const getBI=(b,eid,y)=>(b.income[eid]||{})[y]||[];
const getBE=(b,eid,y)=>(b.expenses[eid]||{})[y]||[];
const getInv=(b,eid)=>b.invoices[eid]||[];
const getBC=(b,eid)=>b.contacts[eid]||[];
const bizEntS=(b,eid,y)=>{const i=getBI(b,eid,y).reduce((s,e)=>s+e.amount,0),x=getBE(b,eid,y).reduce((s,e)=>s+e.amount,0);return{i,e:x,n:i-x};};
const bizTot=(b,y)=>b.entities.reduce((a,en)=>{const s=bizEntS(b,en.id,y);return{i:a.i+s.i,e:a.e+s.e,n:a.n+s.n}},{i:0,e:0,n:0});
const masterTot=()=>{
  const re=reTot(S.selYear);
  const biz=S.bizs.reduce((a,b)=>{const t=bizTot(b,S.selYear);return{i:a.i+t.i,e:a.e+t.e,n:a.n+t.n}},{i:0,e:0,n:0});
  return{i:re.i+biz.i,e:re.e+biz.e,n:re.n+biz.n};
};

// ─── RENDER ENGINE ───────────────────────────
function render(){
  const app=$('#app');app.style.background='#0d0f18';document.documentElement.style.background='#0d0f18';
  // Add status bar spacer for iPhone
  const safeSpacer=document.createElement('div');
  safeSpacer.style.cssText='height:env(safe-area-inset-top,0px);background:#161926;position:fixed;top:0;left:0;right:0;z-index:999';
  document.body.insertBefore(safeSpacer,document.body.firstChild);
  // Add matching padding so content isn't hidden behind spacer

// ─── LOGIN ───────────────────────────────────
let loginMode='login';
function renderLogin(){
  const wrap=el('div',{class:'login-wrap'});
  const card=el('div',{class:'login-card'});
  const logo=el('div',{class:'login-logo'},
    el('div',{class:'login-logo-mark'},'📊'),
    el('div',{class:'login-title serif'},'Portfolio Hub'),
    el('div',{class:'login-sub'},loginMode==='login'?'Welcome back':'Create your account')
  );

  let nameInp=null;
  if(loginMode==='register'){
    nameInp=el('input',{class:'finp',placeholder:'Your name',type:'text',style:{marginBottom:'10px'}});
    nameInp.style.width='100%';
  }
  const emailInp=el('input',{class:'finp',placeholder:'Email address',type:'email'});
  emailInp.style.marginBottom='10px';emailInp.style.width='100%';
  const passInp=el('input',{class:'finp',placeholder:'Password',type:'password'});
  passInp.style.marginBottom='14px';passInp.style.width='100%';
  const errBox=el('div',{style:{display:'none',background:'var(--redB)',border:'1px solid var(--redBo)',borderRadius:'8px',padding:'10px 12px',fontSize:'13px',color:'var(--red)',marginBottom:'12px'}});

  const submitBtn=el('button',{class:'btn btn-gold btn-full'},loginMode==='login'?'Sign In →':'Create Account →');
  submitBtn.addEventListener('click',async()=>{
    errBox.style.display='none';
    const email=emailInp.value.trim();
    const pass=passInp.value;
    const name=nameInp?nameInp.value.trim():'';
    if(!email||!pass){errBox.textContent='Please fill in all fields';errBox.style.display='block';return;}
    if(loginMode==='register'&&!name){errBox.textContent='Please enter your name';errBox.style.display='block';return;}
    // No backend yet — skip straight to app
    if(API_URL.includes('your-app')){
      S.user={name:name||email.split('@')[0],email};
      localStorage.setItem('ph_user',JSON.stringify(S.user));
      render();return;
    }
    submitBtn.textContent='Please wait...';submitBtn.disabled=true;
    try{
      const ep=loginMode==='login'?'/api/auth/login':'/api/auth/register';
      const body=loginMode==='login'?{email,password:pass}:{email,password:pass,name};
      const res=await fetch(API_URL+ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await res.json();
      if(!res.ok){errBox.textContent=data.error||'Something went wrong';errBox.style.display='block';return;}
      S.token=data.token;S.user=data.user;
      localStorage.setItem('ph_token',data.token);localStorage.setItem('ph_user',JSON.stringify(data.user));
      render();
    }catch(e){
      S.user={name:email.split('@')[0],email};localStorage.setItem('ph_user',JSON.stringify(S.user));render();
    }finally{submitBtn.textContent=loginMode==='login'?'Sign In →':'Create Account →';submitBtn.disabled=false;}
  });
  [emailInp,passInp,nameInp&&nameInp].forEach(inp=>{if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitBtn.click();});});

  const switchRow=el('div',{class:'login-switch'});
  switchRow.innerHTML=loginMode==='login'?"Don't have an account? <span>Register</span>":"Already have an account? <span>Sign In</span>";
  switchRow.querySelector('span').addEventListener('click',()=>{loginMode=loginMode==='login'?'register':'login';render();});

  const noteBox=API_URL.includes('your-app')?el('div',{class:'login-note'},'💡 Backend not set up yet — tap Sign In to use the app locally. Your data saves in this browser.'):null;

  card.append(logo,...(nameInp?[nameInp]:[]),emailInp,passInp,errBox,submitBtn,switchRow,...(noteBox?[noteBox]:[]));
  wrap.append(card);
  setTimeout(()=>{(nameInp||emailInp).focus();},100);
  return wrap;
}

// ── LOCAL NL PARSER (works without AI/backend) ──────────────────────────
function extractAmount(text){
  const m=text.match(/\$?([\d,]+(?:\.\d{1,2})?)/);
  return m?parseFloat(m[1].replace(/,/g,'')):null;
}
function extractMonth(text){
  const t=text.toLowerCase();
  const names=['january','february','march','april','may','june','july','august','september','october','november','december'];
  const shorts=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  for(let i=0;i<12;i++){if(t.includes(names[i])||t.includes(shorts[i]))return i;}
  if(t.includes('last month'))return Math.max(0,new Date().getMonth()-1);
  if(t.includes('this month')||t.includes('current'))return new Date().getMonth();
  return new Date().getMonth();
}
function extractCategory(text,cats){
  if(!cats||!cats.length)return 'Other';
  const t=text.toLowerCase();
  // Check for direct category matches
  for(const c of cats){if(t.includes(c.toLowerCase()))return c;}
  // Common keyword mappings
  const map={mortgage:['mortgage','loan','payment'],repairs:['repair','fix','plumb','electric','hvac','roof','leak','broken'],maintenance:['maintenance','maint','clean','lawn','garden'],insurance:['insurance','insur'],taxes:['tax','property tax'],utilities:['utility','utilities','water','electric','gas','internet'],management:['management','manage','manager'],materials:['material','lumber','concrete','supply','supplies'],labor:['labor','labour','worker','crew','sub'],equipment:['equipment','tool','machine'],fuel:['fuel','gas','diesel'],permits:['permit','license','licens']};
  for(const[key,keywords] of Object.entries(map)){
    for(const kw of keywords){
      if(t.includes(kw)){
        // Find best matching cat
        const match=cats.find(c=>c.toLowerCase().includes(key)||key.includes(c.toLowerCase()));
        if(match)return match;
      }
    }
  }
  return cats[0]||'Other';
}
function extractClient(text){
  // Look for patterns like "to/from/for [Name]" or just first proper noun
  const m=text.match(/(?:to|from|for|invoice|client)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/i);
  return m?m[1]:'';
}
function parseNL(text,type,cats){
  const amount=extractAmount(text);
  const month=extractMonth(text);
  if(!amount)return null;
  // Remove the amount and month from text to get description
  let desc=text.replace(/\$?[\d,]+(?:\.\d{1,2})?/,'').replace(/(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|last month|this month)/gi,'').replace(/\s+/g,' ').trim();
  // Remove common words
  desc=desc.replace(/^(paid|pay|payment|received|income|expense|for|from|to|the|a)\s+/i,'').trim();
  if(type==='income')return{amount,month,note:desc};
  if(type==='expense')return{amount,month,category:extractCategory(text,cats),description:desc};
  if(type==='invoice')return{amount,month,client:extractClient(text)||desc,description:desc,status:'Draft'};
  return null;
}

// ─── QUICK ADD ───────────────────────────────
function quickAdd(type,cats,placeholder,onSave){
  let qaState='idle',qaParsed=null,qaEdited=null;
  const wrap=el('div',{});
  
  function buildBox(){
    wrap.innerHTML='';
    const box=el('div',{class:'qa-box'});
    box.append(el('div',{class:'qa-label'},'✦ Quick Add'));
    const row=el('div',{class:'qa-row'});
    const inp=el('textarea',{class:'qa-input',rows:'2',placeholder:placeholder||'Type to add...'});
    const addBtn=el('button',{class:'qa-btn'},'Add →');
    
    addBtn.addEventListener('click',()=>{
      const text=inp.value.trim();if(!text)return;
      // Local parser — no API needed
      const parsed=parseNL(text,type,cats||[]);
      if(parsed){qaParsed=parsed;qaEdited={...parsed};qaState='preview';}
      else{// Show form fallback pre-filled with what we can extract
        const amt=extractAmount(text);
        qaParsed={amount:amt||'',month:new Date().getMonth(),note:text,description:text,category:(cats&&cats[0])||'Other',client:''};
        qaEdited={...qaParsed};qaState='preview';}
      buildBox();
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addBtn.click();}});
    row.append(inp,addBtn);
    box.append(row);
    const hint=el('div',{class:'qa-hint'});
    hint.append(el('span',{style:{fontSize:'10px',color:'var(--dim)'}},'Enter to submit'));
    if(qaState==='error')box.append(el('div',{style:{fontSize:'11px',color:'var(--red)',marginTop:'6px'}},'⚠ Couldn\'t parse. Edit below.'));
    wrap.append(box);

    // Preview card
    if(qaState==='preview'&&qaEdited){
      const prev=el('div',{class:'qa-preview'});
      prev.append(el('div',{class:'qa-preview-label'},'✓ AI Parsed — review & confirm'));
      const grid=el('div',{class:'qa-preview-grid'});
      
      if(type!=='invoice'){
        const mSel=el('select',{class:'finp',style:{padding:'5px 8px',fontSize:'12px'}});
        MONTHS.forEach((m,i)=>{const o=el('option',{},m);if(i===+qaEdited.month)o.selected=true;mSel.append(o);});
        mSel.addEventListener('change',()=>qaEdited.month=+mSel.value);
        grid.append(fld('Month',mSel));
      } else {
        const ci=el('input',{class:'finp',style:{padding:'5px 8px',fontSize:'12px'}});
        ci.value=qaEdited.client||'';ci.addEventListener('input',()=>qaEdited.client=ci.value);
        grid.append(fld('Client',ci));
      }
      const ai=el('input',{class:'finp',type:'number',style:{padding:'5px 8px',fontSize:'12px'}});
      ai.value=qaEdited.amount||'';ai.addEventListener('input',()=>qaEdited.amount=+ai.value);
      grid.append(fld('Amount',ai));
      
      if(type==='expense'){
        const cSel=el('select',{class:'finp',style:{padding:'5px 8px',fontSize:'12px'}});
        (cats||[]).forEach(c=>{const o=el('option',{},c);if(c===qaEdited.category)o.selected=true;cSel.append(o);});
        cSel.addEventListener('change',()=>qaEdited.category=cSel.value);
        grid.append(fld('Category',cSel));
      }
      const di=el('input',{class:'finp',style:{padding:'5px 8px',fontSize:'12px'}});
      di.value=qaEdited.description||qaEdited.note||'';di.addEventListener('input',()=>{qaEdited.description=di.value;qaEdited.note=di.value;});
      grid.append(fld(type==='income'?'Note':'Description',di));
      
      const acts=el('div',{class:'qa-preview-actions'});
      const saveB=el('button',{class:'btn btn-green btn-sm',style:{flex:'1'}},'✓ Save');
      saveB.addEventListener('click',()=>{onSave({...qaEdited});qaState='idle';qaParsed=null;qaEdited=null;buildBox();});
      const discB=el('button',{class:'btn btn-red btn-sm'},'✕');
      discB.addEventListener('click',()=>{qaState='idle';qaParsed=null;qaEdited=null;buildBox();});
      acts.append(saveB,discB);
      prev.append(grid,acts);
      wrap.append(prev);
    }
  }
  
  function fld(label,inputEl){
    const d=el('div',{});
    d.append(el('div',{class:'qa-field-label'},label),inputEl);
    return d;
  }
  
  buildBox();
  return wrap;
}

// ─── MODALS ──────────────────────────────────
function openModal(name){S.modal=name;renderModal();}
function closeModal(){S.modal=null;S.modalData={};$('#modal-overlay')?.remove();}

function renderModal(){
  $('#modal-overlay')?.remove();
  if(!S.modal)return;
  
  const overlay=el('div',{id:'modal-overlay',class:'overlay'});
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  
  const modal=el('div',{class:'modal'});
  const content=buildModalContent(S.modal);
  if(!content){overlay.remove();return;}
  
  const hdr=el('div',{class:'modal-hdr'});
  hdr.append(el('div',{class:'modal-title'},content.title));
  const x=el('button',{class:'modal-x'},'×');x.addEventListener('click',closeModal);
  hdr.append(x);
  modal.append(hdr,el('div',{class:'modal-body'},content.body));
  overlay.append(modal);
  document.body.style.background='#0d0f18';document.body.append(overlay);
  setTimeout(()=>overlay.querySelector('input,textarea')?.focus(),80);
}

function inp(ph,type='text',val=''){const i=el('input',{class:'finp',type,placeholder:ph});i.value=val;return i;}
function sel(opts,curVal){
  const s=el('select',{class:'finp'});
  opts.forEach(o=>{
    const opt=typeof o==='string'?el('option',{},o):el('option',{value:o.v},o.l);
    if((typeof o==='string'?o:o.v)===(curVal+''))opt.selected=true;
    s.append(opt);
  });
  return s;
}

function backupData(){
  const payload={version:2,exportedAt:new Date().toISOString(),data:{properties:S.properties,reInc:S.reInc,reExp:S.reExp,reUtils:S.reUtils,reCont:S.reCont,bizs:S.bizs,selBizEnt:S.selBizEnt,bizTab:S.bizTab}};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download='portfolio-hub-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function restoreData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const payload=JSON.parse(ev.target.result);
      const d=payload.data||payload;
      if(d.properties)S.properties=d.properties;
      if(d.reInc)S.reInc=d.reInc;if(d.reExp)S.reExp=d.reExp;
      if(d.reUtils)S.reUtils=d.reUtils;if(d.reCont)S.reCont=d.reCont;
      if(d.bizs)S.bizs=d.bizs;if(d.selBizEnt)S.selBizEnt=d.selBizEnt;
      if(d.bizTab)S.bizTab=d.bizTab;
      if(S.properties.length)S.selProp=S.properties[0].id;
      save();render();alert('✓ Data restored!');
    }catch{alert('⚠ Could not read backup file.');}
  };
  reader.readAsText(file);e.target.value='';
}

function exportPort(portId){
  let rows,name;
  if(portId==='re'){
    name='Real_Estate';rows=[['Property','Year','Type','Month','Category','Note','Amount']];
    S.properties.forEach(p=>{
      YEARS.forEach(y=>{
        getRI(p.id,y).forEach(e=>rows.push([p.name,y,'Income',MONTHS[e.month],'Rental Income',e.note||'',e.amount]));
        getRE(p.id,y).forEach(e=>rows.push([p.name,y,'Expense',MONTHS[e.month],e.cat,e.desc||'',e.amount]));
      });
      getRU(p.id).forEach(u=>rows.push([p.name,'','Utility','',u.type,u.provider,'']));
    });
  } else {
    const b=getBiz(portId);if(!b)return;
    name=b.name.replace(/\\s+/g,'_');rows=[['Entity','Year','Type','Month','Category','Note','Amount','Status']];
    b.entities.forEach(en=>{
      YEARS.forEach(y=>{
        getBI(b,en.id,y).forEach(e=>rows.push([en.name,y,'Income',MONTHS[e.month],'Revenue',e.note||'',e.amount,'']));
        getBE(b,en.id,y).forEach(e=>rows.push([en.name,y,'Expense',MONTHS[e.month],e.cat,e.desc||'',e.amount,'']));
      });
      getInv(b,en.id).forEach(inv=>rows.push([en.name,inv.year,'Invoice',MONTHS[inv.month],inv.desc||'',inv.client,inv.amount,inv.status]));
    });
  }
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\\uFEFF'+csv],{type:'text/csv'}));
  a.download=name+'_'+S.selYear+'.csv';a.click();
}
