<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0d0f18"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Portfolio Hub</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100%;background:#0d0f18}
    body{font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useMemo, useRef } = React;


const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CY = new Date().getFullYear();
const YEARS = Array.from({length:21},(_,i)=>CY-10+i);
const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);
const fmt  = n => (+n||0).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
const fmtD = n => (+n||0).toLocaleString("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2});

const RE_CATS = ["Mortgage","Insurance","Taxes","Repairs","Maintenance","Management","Utilities","HOA","Other"];
const INVOICE_STATUSES = ["Draft","Sent","Paid","Overdue","Cancelled"];
const UTIL_TYPES = ["Electric","Gas","Water","Internet","Trash","Sewer","HOA","Security","Other"];
const UTIL_ICONS = {Electric:"⚡",Gas:"🔥",Water:"💧",Internet:"📶",Trash:"🗑️",Sewer:"🚿",HOA:"🏘️",Security:"🔒",Other:"📋"};
const BIZ_ICONS = ["💼","🏗️","⚡","🏡","💻","🏥","🚗","🍕","✂️","📦","🎨","🔧","🌿","📱","🏋️","🎵","📸","🛒","✈️","🏦"];
const BIZ_COLORS = [
  {label:"Blue",    val:"#5b8dee", bg:"#1a2340", border:"#2a3a60"},
  {label:"Emerald", val:"#5cb87a", bg:"#152a1e", border:"#1e4a2e"},
  {label:"Gold",    val:"#e8d5a3", bg:"#2a2410", border:"#4a3e18"},
  {label:"Violet",  val:"#a78bfa", bg:"#1e1a35", border:"#3a2a60"},
  {label:"Rose",    val:"#f472b6", bg:"#2a1525", border:"#5a2040"},
  {label:"Cyan",    val:"#22d3ee", bg:"#0f2530", border:"#1a3e50"},
  {label:"Orange",  val:"#fb923c", bg:"#2a1a0f", border:"#5a3010"},
  {label:"Lime",    val:"#a3e635", bg:"#1a2810", border:"#2e4818"},
  {label:"Fuchsia", val:"#e879f9", bg:"#2a1030", border:"#501850"},
  {label:"Teal",    val:"#2dd4bf", bg:"#0f2525", border:"#1a4040"},
];

// ── DARK THEME TOKENS ──
const D = {
  bg:"#0d0f18",       surface:"#161926",   s2:"#1e2130",    s3:"#252838",
  border:"#232638",   border2:"#2e3248",
  text:"#e8e4dc",     muted:"#6a7080",     dim:"#3a3d4a",
  gold:"#e8d5a3",     goldDim:"#a89060",
  green:"#5cb87a",    greenBg:"#152a1e",   greenBorder:"#1e4a2e",
  red:"#e07070",      redBg:"#2a1515",     redBorder:"#4a2020",
  blue:"#5b8dee",     blueBg:"#1a2340",    blueBorder:"#2a3a60",
};
const T = { serif:"'Playfair Display',Georgia,serif", sans:"'DM Sans',system-ui,sans-serif" };
const iSt = {width:"100%",background:D.s2,border:`1.5px solid ${D.border2}`,color:D.text,padding:"10px 13px",borderRadius:9,fontSize:14,fontFamily:"inherit",outline:"none",appearance:"none",WebkitAppearance:"none",boxSizing:"border-box"};

// ── PRIMITIVES ──
function FI(p){return <input style={iSt} {...p}/>;}
function FS({opts,...p}){return <select style={iSt} {...p}>{opts.map((o,i)=>typeof o==="string"?<option key={i}>{o}</option>:<option key={i} value={o.v}>{o.l}</option>)}</select>;}
function FT(p){return <textarea style={{...iSt,resize:"none"}} {...p}/>;}
function FF({label,children,mb=13}){return <div style={{marginBottom:mb}}><label style={{display:"block",fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:D.muted,marginBottom:7}}>{label}</label>{children}</div>;}
function FR({children,cols="1fr 1fr",mb=13}){return <div style={{display:"grid",gridTemplateColumns:cols,gap:12,marginBottom:mb}}>{children}</div>;}

function Toggle({on,onChange,label}){
  return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 0",borderBottom:`1px solid ${D.border}`}}>
    <span style={{fontSize:13,color:D.text,fontWeight:500}}>{label}</span>
    <div onClick={()=>onChange(!on)} style={{width:42,height:23,borderRadius:12,background:on?D.gold:D.dim,cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <div style={{position:"absolute",top:3,left:on?19:3,width:17,height:17,borderRadius:9,background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.4)"}}/>
    </div>
  </div>;
}

function Btn({v="primary",full,sm,onClick,children,style:s={}}){
  const vars={
    primary:{background:D.gold,color:"#0c0e16",border:"none"},
    ghost:{background:"transparent",color:D.muted,border:`1.5px solid ${D.border2}`},
    danger:{background:D.redBg,color:D.red,border:`1.5px solid ${D.redBorder}`},
    green:{background:D.greenBg,color:D.green,border:`1.5px solid ${D.greenBorder}`},
    blue:{background:D.blueBg,color:D.blue,border:`1.5px solid ${D.blueBorder}`},
    dark:{background:D.s2,color:D.muted,border:`1.5px solid ${D.border2}`},
  };
  return <button onClick={onClick} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:9,fontWeight:700,fontSize:sm?12:13,cursor:"pointer",fontFamily:T.sans,padding:full?"11px 20px":sm?"6px 12px":"8px 15px",whiteSpace:"nowrap",lineHeight:1,width:full?"100%":"auto",transition:"opacity .12s",...vars[v],...s}}>{children}</button>;
}
function BtnRow({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:18}}>{children}</div>;}

function Modal({open,onClose,title,children,width=460}){
  if(!open) return null;
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
    <div style={{background:D.surface,border:`1.5px solid ${D.border2}`,borderRadius:18,width:"100%",maxWidth:width,boxShadow:"0 40px 100px rgba(0,0,0,.7)",maxHeight:"92vh",overflowY:"auto",margin:"auto"}}>
      <div style={{padding:"18px 22px 13px",borderBottom:`1px solid ${D.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:D.surface,zIndex:1}}>
        <span style={{fontFamily:T.serif,fontSize:16,fontWeight:700,color:D.gold}}>{title}</span>
        <button onClick={onClose} style={{background:D.s3,border:"none",borderRadius:"50%",width:26,height:26,cursor:"pointer",fontSize:14,color:D.muted,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      <div style={{padding:"16px 22px 22px"}}>{children}</div>
    </div>
  </div>;
}

function KPI({label,value,color,bg,border,sub}){
  return <div style={{background:bg||D.s2,border:`1.5px solid ${border||D.border}`,borderRadius:12,padding:"12px 14px"}}>
    <div style={{fontSize:9,color,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:5,opacity:.8}}>{label}</div>
    <div style={{fontFamily:T.serif,fontSize:19,fontWeight:700,color,lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{fmt(value)}</div>
    {sub&&<div style={{fontSize:10,color,opacity:.5,marginTop:4}}>{sub}</div>}
  </div>;
}

function SH({label,action}){
  return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11,flexWrap:"wrap",gap:8}}>
    <span style={{fontSize:9,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase",color:D.muted}}>{label}</span>
    {action}
  </div>;
}

function Card({children,style={}}){
  return <div style={{background:D.surface,border:`1.5px solid ${D.border}`,borderRadius:13,overflow:"hidden",marginBottom:13,...style}}>{children}</div>;
}

function TH({right,children}){
  return <th style={{padding:"8px 11px",fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,color:D.muted,borderBottom:`1px solid ${D.border}`,textAlign:right?"right":"left",whiteSpace:"nowrap",background:D.s3}}>{children}</th>;
}
function TD({right,color,bold,muted,children}){
  return <td style={{padding:"9px 11px",borderBottom:`1px solid ${D.s3}`,textAlign:right?"right":"left",fontWeight:bold?700:400,color:color||(muted?D.muted:D.text),verticalAlign:"middle",fontVariantNumeric:right?"tabular-nums":"normal",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{children}</td>;
}
function TFC({right,color,bold,children}){
  return <td style={{padding:"9px 11px",borderTop:`1.5px solid ${D.border}`,background:"#0b0d16",textAlign:right?"right":"left",color:color||D.muted,fontWeight:bold?700:600,fontSize:right?13:9,letterSpacing:right?0:1.5,textTransform:right?"none":"uppercase",fontVariantNumeric:right?"tabular-nums":"normal"}}>{children}</td>;
}
function DelBtn({onClick}){
  return <td style={{padding:"6px 8px",textAlign:"center",borderBottom:`1px solid ${D.s3}`,width:"36px"}}>
    <button onClick={onClick} style={{background:"none",border:"none",cursor:"pointer",color:D.dim,fontSize:15,lineHeight:1,padding:"2px 5px"}}>×</button>
  </td>;
}
function Empty({icon,title,sub}){
  return <div style={{padding:"40px 20px",textAlign:"center"}}>
    <div style={{fontSize:30,marginBottom:10}}>{icon}</div>
    <div style={{fontSize:13,color:D.muted,marginBottom:4,fontWeight:500}}>{title}</div>
    <div style={{fontSize:11,color:D.dim}}>{sub}</div>
  </div>;
}
function Tag({children}){
  return <span style={{display:"inline-flex",alignItems:"center",background:D.s3,color:D.goldDim,padding:"3px 9px",borderRadius:6,fontSize:11,fontWeight:600,whiteSpace:"nowrap",border:`1px solid ${D.border}`}}>{children}</span>;
}

function Seg({tabs,active,onChange}){
  return <div style={{display:"inline-flex",background:D.s2,borderRadius:10,padding:3,marginBottom:13,gap:2,border:`1px solid ${D.border}`,flexWrap:"wrap"}}>
    {tabs.map(t=><button key={t} onClick={()=>onChange(t)} style={{padding:"6px 13px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:T.sans,background:active===t?D.gold:"transparent",color:active===t?"#0c0e16":D.muted,transition:"all .15s"}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
  </div>;
}

function SummaryTable({rows,totI,totE,totN,incColor}){
  const ic = incColor||D.green;
  return <Card>
    <div style={{padding:"9px 12px",borderBottom:`1px solid ${D.border}`,fontSize:9,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:D.muted,background:D.s3}}>Month-by-Month</div>
    <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
      <thead><tr style={{background:D.s3}}>
        {["Month","Income","Expenses","Net"].map((h,i)=><th key={h} style={{padding:"8px 11px",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,color:D.muted,borderBottom:`1px solid ${D.border}`,textAlign:i===0?"left":"right",width:"25%"}}>{h}</th>)}
      </tr></thead>
      <tbody>{rows.map(({m,inc,exp,net})=><tr key={m}>
        <td style={{padding:"8px 11px",borderBottom:`1px solid ${D.s3}`,fontWeight:600,color:D.text,fontSize:12}}>{m}</td>
        <td style={{padding:"8px 11px",borderBottom:`1px solid ${D.s3}`,textAlign:"right",color:inc?ic:D.dim,fontWeight:inc?600:400,fontVariantNumeric:"tabular-nums",fontSize:12}}>{inc?fmt(inc):"—"}</td>
        <td style={{padding:"8px 11px",borderBottom:`1px solid ${D.s3}`,textAlign:"right",color:exp?D.red:D.dim,fontWeight:exp?600:400,fontVariantNumeric:"tabular-nums",fontSize:12}}>{exp?fmt(exp):"—"}</td>
        <td style={{padding:"8px 11px",borderBottom:`1px solid ${D.s3}`,textAlign:"right",fontWeight:700,color:net>0?D.green:net<0?D.red:D.dim,fontVariantNumeric:"tabular-nums",fontSize:12}}>{inc||exp?fmt(net):"—"}</td>
      </tr>)}</tbody>
      <tfoot><tr style={{background:"#0b0d16"}}>
        <td style={{padding:"9px 11px",borderTop:`1.5px solid ${D.border}`,fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:D.muted}}>Annual</td>
        <td style={{padding:"9px 11px",borderTop:`1.5px solid ${D.border}`,textAlign:"right",color:ic,fontWeight:700,fontSize:13,fontVariantNumeric:"tabular-nums"}}>{fmt(totI)}</td>
        <td style={{padding:"9px 11px",borderTop:`1.5px solid ${D.border}`,textAlign:"right",color:D.red,fontWeight:700,fontSize:13,fontVariantNumeric:"tabular-nums"}}>{fmt(totE)}</td>
        <td style={{padding:"9px 11px",borderTop:`1.5px solid ${D.border}`,textAlign:"right",color:totN>=0?D.gold:D.red,fontWeight:700,fontSize:13,fontVariantNumeric:"tabular-nums"}}>{fmt(totN)}</td>
      </tr></tfoot>
    </table>
  </Card>;
}

function ContactsGrid({contacts,onEdit,onDel}){
  if(!contacts.length) return <Empty icon="👤" title="No contacts yet" sub="Tap + Add Contact"/>;
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:10}}>
    {contacts.map(c=><div key={c.id} style={{background:D.s2,border:`1.5px solid ${D.border}`,borderRadius:12,padding:13}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9}}>
        <div><div style={{fontSize:13,fontWeight:700,color:D.gold,marginBottom:2}}>{c.name}</div>{c.role&&<div style={{fontSize:11,color:D.muted}}>{c.role}</div>}</div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={()=>onEdit(c)} style={{background:D.s3,border:"none",borderRadius:6,width:24,height:24,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>
          <button onClick={()=>onDel(c.id)} style={{background:D.redBg,border:"none",borderRadius:6,width:24,height:24,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>🗑️</button>
        </div>
      </div>
      <div style={{borderTop:`1px solid ${D.border}`,paddingTop:8,display:"flex",flexDirection:"column",gap:5}}>
        {c.phone&&<div style={{display:"flex",gap:8,fontSize:11}}><span style={{color:D.muted,fontSize:9,width:44,flexShrink:0,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Phone</span><a href={`tel:${c.phone}`} style={{color:D.blue,fontWeight:600,textDecoration:"none"}}>{c.phone}</a></div>}
        {c.email&&<div style={{display:"flex",gap:8,fontSize:11}}><span style={{color:D.muted,fontSize:9,width:44,flexShrink:0,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Email</span><a href={`mailto:${c.email}`} style={{color:D.blue,fontWeight:600,textDecoration:"none",wordBreak:"break-all"}}>{c.email}</a></div>}
        {c.notes&&<div style={{display:"flex",gap:8,fontSize:11}}><span style={{color:D.muted,fontSize:9,width:44,flexShrink:0,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Notes</span><span style={{color:D.muted}}>{c.notes}</span></div>}
      </div>
    </div>)}
  </div>;
}

function ContactForm({f,setF}){
  return <>
    <FF label="Name *"><FI value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))} placeholder="Full name" autoFocus/></FF>
    <FF label="Role / Title"><FI value={f.role} onChange={e=>setF(x=>({...x,role:e.target.value}))} placeholder="e.g. Tenant, Plumber, Supplier"/></FF>
    <FR><FF label="Phone"><FI value={f.phone} onChange={e=>setF(x=>({...x,phone:e.target.value}))} type="tel" placeholder="555-0000"/></FF><FF label="Email"><FI value={f.email} onChange={e=>setF(x=>({...x,email:e.target.value}))} type="email" placeholder="name@email.com"/></FF></FR>
    <FF label="Notes" mb={0}><FI value={f.notes} onChange={e=>setF(x=>({...x,notes:e.target.value}))} placeholder="Any notes"/></FF>
  </>;
}

// ── QUICK ADD (Natural Language Input) ──
function QuickAdd({onSave,cats,type,placeholder,apiKey}){
  const [text,setText]=useState("");
  const [state,setState]=useState("idle"); // idle | loading | preview | error
  const [parsed,setParsed]=useState(null);
  const [edited,setEdited]=useState(null);
  const [showForm,setShowForm]=useState(false);

  async function parse(){
    if(!text.trim())return;
    setState("loading");
    const catList=cats||[];
    const prompt=type==="income"
      ?`Parse this income entry: "${text}"
Return ONLY JSON: {"month":<0-11>,"amount":<number>,"note":"<description>"}`
      :type==="invoice"
      ?`Parse this invoice: "${text}"
Return ONLY JSON: {"client":"<name>","description":"<work>","amount":<number>,"month":<0-11>,"status":"Draft"}`
      :`Parse this expense: "${text}"
Categories: ${catList.join(", ")}
Return ONLY JSON: {"month":<0-11>,"amount":<number>,"category":"<best match>","description":"<brief>"}`;
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:prompt}]})});
      const data=await resp.json();
      const raw=data.content?.map(x=>x.text||"").join("")||"";
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setParsed(p);setEdited({...p});setState("preview");setText("");
    }catch{setState("error");}
  }

  function save(){onSave(edited);setState("idle");setParsed(null);setEdited(null);}

  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

  return <div style={{marginBottom:12}}>
    {/* Quick text input — always visible */}
    <div style={{background:D.s2,border:`1.5px solid ${state==="preview"?D.green:D.border2}`,borderRadius:12,padding:12,marginBottom:state==="preview"?10:0,transition:"border-color .2s"}}>
      <div style={{fontSize:9,color:D.goldDim,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:7}}>✦ Quick Add</div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();parse();}}}
          placeholder={placeholder||`Type naturally e.g. "$1,200 rent January" or "paid plumber $340 last month"`}
          rows={2}
          style={{flex:1,background:D.s3,border:`1px solid ${D.border}`,color:D.text,fontSize:13,fontFamily:T.sans,resize:"none",outline:"none",lineHeight:1.5,borderRadius:9,padding:"8px 11px",caretColor:D.gold}}
        />
        <button onClick={parse} disabled={state==="loading"||!text.trim()} style={{background:state==="loading"?D.s3:D.gold,color:"#0c0e16",border:"none",borderRadius:9,padding:"8px 14px",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:T.sans,flexShrink:0,height:52,opacity:!text.trim()?.5:1,transition:"all .15s"}}>
          {state==="loading"?"…":"Add →"}
        </button>
      </div>
      {state==="error"&&<div style={{fontSize:11,color:D.red,marginTop:6}}>⚠ Couldn't parse — fill the form below instead.</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:7}}>
        <span style={{fontSize:10,color:D.dim}}>Enter to submit · Shift+Enter for new line</span>
        <button onClick={()=>setShowForm(f=>!f)} style={{background:"transparent",border:"none",color:D.muted,fontSize:11,cursor:"pointer",fontFamily:T.sans,fontWeight:600}}>{showForm?"✕ Hide form":"⊞ Manual form"}</button>
      </div>
    </div>

    {/* AI Preview card */}
    {state==="preview"&&edited&&<div style={{background:D.greenBg,border:`1.5px solid ${D.greenBorder}`,borderRadius:12,padding:13,marginBottom:10}}>
      <div style={{fontSize:9,color:D.green,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>✓ AI Parsed — review &amp; confirm</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {type!=="invoice"&&<div>
          <div style={{fontSize:9,color:D.muted,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:4}}>Month</div>
          <select value={edited.month} onChange={e=>setEdited(x=>({...x,month:+e.target.value}))} style={{...iSt,padding:"6px 10px",fontSize:12}}>
            {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
        </div>}
        {type==="invoice"&&<div>
          <div style={{fontSize:9,color:D.muted,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:4}}>Client</div>
          <input value={edited.client||""} onChange={e=>setEdited(x=>({...x,client:e.target.value}))} style={{...iSt,padding:"6px 10px",fontSize:12}}/>
        </div>}
        <div>
          <div style={{fontSize:9,color:D.muted,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:4}}>Amount</div>
          <input type="number" value={edited.amount||""} onChange={e=>setEdited(x=>({...x,amount:e.target.value}))} style={{...iSt,padding:"6px 10px",fontSize:12}}/>
        </div>
        {type==="expense"&&<div>
          <div style={{fontSize:9,color:D.muted,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:4}}>Category</div>

}

      {/* AI Receipt + Drive Upload */}
      <Modal open={modal==="receipt"} onClose={()=>{close();setAiState("idle");setAiData(null);}} title="📷 Scan Receipt → Drive" width={480}>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{
          const file=e.target.files[0];if(!file)return;
          setAiState("loading");
          const cats=aiCtx?.cats||RE_CATS;
          // Run AI + Drive upload in parallel
          const reader=new FileReader();
          reader.onload=async ev=>{
            const base64=ev.target.result.split(",")[1];
            const [aiResp,driveResp]=await Promise.allSettled([
              fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:base64}},{type:"text",text:`Read this receipt. Return ONLY valid JSON:
{"amount":<number>,"description":"<max 60 chars>","category":"<one of: ${cats.join(", ")}>","vendor":"<n>","date":"<MM/DD/YYYY or null>"}`}]}]})}).then(r=>r.json()),
              uploadToDrive(file,{portType:aiCtx?.port==="re"?"re":"biz",month:new Date().getMonth(),year:selYear,label:aiCtx?.port==="re"?"Real Estate":(activeBiz?.name||"Business")}),
            ]);
            // Process AI result
            try{
              const data=aiResp.value||aiResp.reason;
              const text=data.content?.map(x=>x.text||"").join("")||"";
              const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
              setAiData({...parsed,driveUrl:driveResp.value?.url||null});
              setRExp(r=>({...r,amount:parsed.amount||"",desc:parsed.description||"",cat:cats.includes(parsed.category)?parsed.category:cats[0],month:parsed.date?parseInt(parsed.date.split("/")[0])-1:r.month}));
              setAiState("done");
            }catch{setAiState("error");}
          };
          reader.readAsDataURL(file);
        }}/>
        {aiState==="idle"&&(
          <div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${D.border2}`,borderRadius:14,padding:"38px 20px",textAlign:"center",cursor:"pointer",background:D.s2,marginBottom:4}}>
            <div style={{fontSize:40,marginBottom:12}}>📸</div>
            <div style={{fontSize:14,fontWeight:700,color:D.gold,marginBottom:6}}>Take a photo or upload</div>
            <div style={{fontSize:12,color:D.muted,marginBottom:4}}>AI reads the receipt and fills in expense details</div>
            {authToken&&<div style={{fontSize:11,color:D.green,marginTop:6}}>✓ Will auto-save to Google Drive</div>}
            {!authToken&&<div style={{fontSize:11,color:D.goldDim,marginTop:6}}>Connect backend to auto-save to Drive</div>}
          </div>
        )}
        {aiState==="loading"&&(
          <div style={{textAlign:"center",padding:"38px 20px",background:D.s2,borderRadius:14,marginBottom:14}}>
            <div style={{fontSize:36,marginBottom:12}}>🤖</div>
            <div style={{fontWeight:700,color:D.gold,marginBottom:4}}>Reading receipt{driveUploading?" + uploading to Drive":""}...</div>
            <div style={{fontSize:12,color:D.muted}}>AI is extracting the details</div>
          </div>
        )}
        {aiState==="error"&&(
          <div style={{background:D.redBg,border:`1.5px solid ${D.redBorder}`,borderRadius:10,padding:13,fontSize:12,color:D.red,marginBottom:14}}>
            ⚠ Couldn't read clearly. Fill in the details manually below.
          </div>
        )}
        {aiState==="done"&&aiData&&(
          <div style={{background:D.greenBg,border:`1.5px solid ${D.greenBorder}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:9,color:D.green,letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>✓ AI Detected</div>
              {aiData.driveUrl&&<a href={aiData.driveUrl} target="_blank" rel="noreferrer" style={{fontSize:10,color:D.blue,fontWeight:700,textDecoration:"none"}}>📁 View in Drive →</a>}
              {!aiData.driveUrl&&<span style={{fontSize:10,color:D.goldDim}}>Drive: not connected</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,fontSize:12}}>
              {[["Vendor",aiData.vendor||"—",D.text],["Amount",aiData.amount?fmtD(aiData.amount):"—",D.green],["Category",aiData.category||"—",D.gold],["Date",aiData.date||"—",D.text]].map(([l,v,c])=>(
                <div key={l}><div style={{fontSize:9,color:D.muted,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:3}}>{l}</div><div style={{fontWeight:700,color:c}}>{v}</div></div>
              ))}
            </div>
          </div>
        )}
        {(aiState==="done"||aiState==="error")&&(<>
          <FR><FF label="Month"><FS opts={MONTHS.map((m,i)=>({v:i,l:m}))} value={rExp.month} onChange={e=>setRExp(r=>({...r,month:e.target.value}))}/></FF><FF label="Category"><FS opts={aiCtx?.cats||RE_CATS} value={rExp.cat} onChange={e=>setRExp(r=>({...r,cat:e.target.value}))}/></FF></FR>
          <FF label="Amount ($)"><FI type="number" inputMode="decimal" value={rExp.amount} onChange={e=>setRExp(r=>({...r,amount:e.target.value}))} placeholder="0.00"/></FF>
          <FF label="Description" mb={0}><FI value={rExp.desc} onChange={e=>setRExp(r=>({...r,desc:e.target.value}))}/></FF>
          <BtnRow>
            <Btn v="primary" full onClick={()=>{
              const driveUrl=aiData?.driveUrl||null;
              if(aiCtx?.port==="re"){const a=parseFloat(rExp.amount);if(!a||isNaN(a))return;setReExp(v=>{const n={...v};(n[selProp]??={})[selYear]??=[];n[selProp][selYear]=[...n[selProp][selYear],{id:uid(),month:+rExp.month,cat:rExp.cat,desc:rExp.desc,amount:a,receiptUrl:driveUrl}];return n});setAiState("idle");setAiData(null);close();}
              else{const a=parseFloat(rExp.amount);if(!a||isNaN(a))return;const bizId=aiCtx?.port;const eid=selBizEnt[bizId];updBiz(bizId,b=>{const exp={...b.expenses};(exp[eid]??={})[selYear]??=[];exp[eid][selYear]=[...exp[eid][selYear],{id:uid(),month:+rExp.month,cat:rExp.cat,desc:rExp.desc,amount:a,receiptUrl:driveUrl}];return{...b,expenses:exp}});setAiState("idle");setAiData(null);close();}
            }}>Save Expense</Btn>
            <Btn v="ghost" full onClick={()=>{setAiState("idle");setAiData(null);if(fileRef.current)fileRef.current.value="";}}>Scan Again</Btn>
          </BtnRow>
        </>)}
      </Modal>

    </div>
  );
}


// ══════════════════════════════════════
//  LOGIN SCREEN
// ══════════════════════════════════════
const API_URL = "https://your-app.ondigitalocean.app"; // ← update this when backend is live

function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ name:"", email:"", password:"" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const LD = {
    bg:"#0d0f18", surface:"#161926", s2:"#1e2130",
    border:"#232638", border2:"#2e3248",
    text:"#e8e4dc", muted:"#6a7080",
    gold:"#e8d5a3", red:"#e07070", redBg:"#2a1515", redBorder:"#4a2020",
  };
  const LT = { serif:"'Playfair Display',Georgia,serif", sans:"'DM Sans',system-ui,sans-serif" };
  const inp = { width:"100%", background:LD.s2, border:`1.5px solid ${LD.border2}`, color:LD.text,
    padding:"13px 15px", borderRadius:10, fontSize:15, fontFamily:LT.sans,
    outline:"none", boxSizing:"border-box", marginBottom:12 };

  async function submit() {
    setError("");
    if(!form.email||!form.password){setError("Please fill in all fields");return;}
    if(mode==="register"&&!form.name){setError("Please enter your name");return;}

    // No backend yet → skip straight to app
    if(API_URL.includes("your-app")){
      onLogin({name:form.name||form.email.split("@")[0],email:form.email},null);
      return;
    }
    setLoading(true);
    try{
      const ep=mode==="login"?"/api/auth/login":"/api/auth/register";
      const body=mode==="login"
        ?{email:form.email,password:form.password}
        :{email:form.email,password:form.password,name:form.name};
      const res=await fetch(API_URL+ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json();
      if(!res.ok){setError(data.error||"Something went wrong");return;}
      localStorage.setItem("ph_token",data.token);
      localStorage.setItem("ph_user",JSON.stringify(data.user));
      onLogin(data.user,data.token);
    }catch(e){
      setError("Can't reach server — using local mode.");
      onLogin({name:form.email.split("@")[0],email:form.email},null);
    }finally{setLoading(false);}
  }

  return (
    <div style={{background:LD.bg,minHeight:"100vh",display:"flex",alignItems:"center",
      justifyContent:"center",padding:20,fontFamily:LT.sans}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap');`}</style>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:54,height:54,borderRadius:14,background:`linear-gradient(135deg,${LD.gold},#a07830)`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px"}}>📊</div>
          <div style={{fontFamily:LT.serif,fontSize:28,fontWeight:700,color:LD.gold,marginBottom:6}}>Portfolio Hub</div>
          <div style={{fontSize:13,color:LD.muted}}>{mode==="login"?"Welcome back":"Create your account"}</div>
        </div>
        <div style={{background:LD.surface,border:`1.5px solid ${LD.border}`,borderRadius:20,padding:28}}>
          {mode==="register"&&<input style={inp} placeholder="Your name" value={form.name}
            onChange={e=>setForm(f=>({...f,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/>}
          <input style={inp} placeholder="Email address" type="email" value={form.email}
            onChange={e=>setForm(f=>({...f,email:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()}
            autoFocus={mode==="login"}/>
          <input style={{...inp,marginBottom:error?8:18}} placeholder="Password" type="password" value={form.password}
            onChange={e=>setForm(f=>({...f,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {error&&<div style={{background:LD.redBg,border:`1px solid ${LD.redBorder}`,borderRadius:8,
            padding:"10px 13px",fontSize:13,color:LD.red,marginBottom:14}}>{error}</div>}
          <button onClick={submit} disabled={loading} style={{width:"100%",background:LD.gold,color:"#0c0e16",
            border:"none",borderRadius:10,padding:"14px",fontWeight:700,fontSize:15,
            cursor:loading?"wait":"pointer",fontFamily:LT.sans,marginBottom:14,opacity:loading?0.7:1}}>
            {loading?"Please wait...":mode==="login"?"Sign In →":"Create Account →"}
          </button>
          <button onClick={()=>window.location.href=API_URL+"/api/auth/google"}
            disabled={API_URL.includes("your-app")}
            style={{width:"100%",background:LD.s2,color:LD.text,border:`1.5px solid ${LD.border2}`,
              borderRadius:10,padding:"13px",fontWeight:600,fontSize:14,cursor:"pointer",
              fontFamily:LT.sans,marginBottom:18,display:"flex",alignItems:"center",
              justifyContent:"center",gap:10,opacity:API_URL.includes("your-app")?0.4:1}}>
            <span style={{fontSize:18}}>🔵</span>
            {API_URL.includes("your-app")?"Sign in with Google (setup required)":"Sign in with Google"}
          </button>
          <div style={{textAlign:"center",fontSize:13,color:LD.muted}}>
            {mode==="login"?"Don't have an account? ":"Already have an account? "}
            <span onClick={()=>{setMode(mode==="login"?"register":"login");setError("");}}
              style={{color:LD.gold,fontWeight:700,cursor:"pointer"}}>
              {mode==="login"?"Register":"Sign in"}
            </span>
          </div>
          {API_URL.includes("your-app")&&<div style={{marginTop:16,padding:"10px 13px",
            background:LD.s2,borderRadius:8,border:`1px solid ${LD.border}`,
            fontSize:12,color:LD.muted,textAlign:"center",lineHeight:1.6}}>
            💡 Backend not set up yet — tap Sign In to use the app. Your data saves in this browser.
          </div>}
        </div>
      </div>
    </div>
  );
}

// ══ ROOT — shows login OR the main app ══
function Root() {
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("ph_user"));}catch{return null;}});
  const [token,setToken]=useState(()=>localStorage.getItem("ph_token")||null);

  // Pick up Google OAuth token from URL
  const [,]=useState(()=>{
    const params=new URLSearchParams(window.location.search);
    const t=params.get("token");
    if(t){
      localStorage.setItem("ph_token",t);
      setToken(t);
      fetch(API_URL+"/api/auth/me",{headers:{Authorization:`Bearer ${t}`}})
        .then(r=>r.json()).then(u=>{localStorage.setItem("ph_user",JSON.stringify(u));setUser(u);}).catch(()=>{});
      window.history.replaceState({},"",window.location.pathname);
    }
  });

  function handleLogin(u,t){setUser(u);setToken(t);if(u)localStorage.setItem("ph_user",JSON.stringify(u));}
  function handleLogout(){localStorage.removeItem("ph_token");localStorage.removeItem("ph_user");setUser(null);setToken(null);}

  if(!user) return <LoginScreen onLogin={handleLogin}/>;
  return <App authToken={token} currentUser={user} onLogout={handleLogout}/>;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root/>);
  </script>
</body>
